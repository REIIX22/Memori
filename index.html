<!DOCTYPE html>
<html>
<head>
<title>メモリ</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#f5f5f5; /* soft background */
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
}

/* character */
.character{
  margin-top:40px;
  text-align:center;
}

.character img{
  width:350px; /* big image */
  max-width:90%;
  image-rendering:pixelated;
  display:none; /* start hidden */
}

/* dialogue container */
.dialogue-container{
  position:relative;
  width:70%;
  margin-bottom:50px;
}

/* name box */
.name-box{
  position:absolute;
  top:-25px;
  left:10px;
  background:white;
  border:3px solid black;
  padding:6px 14px;
  font-weight:bold;
  font-size:18px;
}

/* dialogue box */
.dialogue{
  background:white;
  border:4px solid black;
  padding:25px;
  font-size:22px;
  line-height:1.6;
  border-radius:5px;
  min-height:120px;
}

/* next/continue button */
button{
  margin-top:15px;
  background:white;
  border:2px solid black;
  padding:8px 18px;
  cursor:pointer;
  font-family:monospace;
}

button:hover{
  background:black;
  color:white;
}

/* mute/unmute button */
#muteBtn{
  position:absolute;
  top:10px;
  right:10px;
  padding:6px 10px;
  font-size:16px;
  background:white;
  border:2px solid black;
  cursor:pointer;
}

#muteBtn:hover{
  background:black;
  color:white;
}
</style>
</head>

<body>

<!-- looping background music -->
<audio id="bgm" src="whitespace.mp3" loop></audio>

<!-- mute/unmute button -->
<button id="muteBtn" onclick="toggleBGM()">🔊</button>

<!-- character images (all hidden initially) -->
<div class="character">
  <img id="phantom" src="mewoary.png">
  <img id="wickey" src="mewohoney.png">
</div>

<!-- dialogue box -->
<div class="dialogue-container">
  <div class="name-box" id="speaker">Phantom</div>
  <div class="dialogue">
    <p id="text"></p>
    <button id="nextBtn" onclick="nextDialogue()">Next ▶</button>
  </div>
</div>

<script>
let dialogue = [
  {name:"Phantom", text:"Do you remember still remember the first time we confessed to each other?", img:"phantom"},
  {name:"Wickey", text:"Yes, of course I do. How can I possibly not?", img:"wickey"},
  {name:"Phantom", text:"We were a little silly back then... We still are, but I wouldn’t change any of it. I really love us so much.", img:"phantom"},
  {name:"Wickey", text:"Me too. I really love us so much too.", img:"wickey"},
  {name:"Phantom", text:"Happy 1st year anniversary to us, Honey! I love you so much <3", img:"phantom"}
];

let i = 0;
let j = 0;
let typingSpeed = 40;
let typingInterval;

// function to show only current speaking character
function showCharacter(id){
  document.getElementById("phantom").style.display = "none";
  document.getElementById("wickey").style.display = "none";
  document.getElementById(id).style.display = "block";
}

// typing effect
function typeText(text){
  clearTimeout(typingInterval);
  let elem = document.getElementById("text");
  elem.innerHTML = "";
  j = 0;
  function typing(){
    if(j < text.length){
      elem.innerHTML += text.charAt(j);
      j++;
      typingInterval = setTimeout(typing, typingSpeed);
    }
  }
  typing();
}

// initialize first dialogue
showCharacter(dialogue[0].img);
typeText(dialogue[0].text);
document.getElementById("speaker").innerText = dialogue[0].name;

function nextDialogue(){
  i++;
  if(i < dialogue.length){
    document.getElementById("speaker").innerText = dialogue[i].name;
    showCharacter(dialogue[i].img);
    typeText(dialogue[i].text);

    if(i === dialogue.length - 1){
      document.getElementById("nextBtn").innerText = "Continue";
    }
  } else {
    window.location.href = "memoryofus.html";
  }
}

// toggle background music
function toggleBGM(){
  const bgm = document.getElementById("bgm");
  if(bgm.paused){
    bgm.play();
  } else {
    bgm.pause();
  }
}

// play BGM immediately on page load
window.addEventListener('DOMContentLoaded', () => {
  const bgm = document.getElementById("bgm");
  bgm.volume = 0.5;
  const playPromise = bgm.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      console.log("Autoplay prevented, user interaction required.");
    });
  }
});
</script>

</body>
</html>
