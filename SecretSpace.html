<!DOCTYPE html>
<html>
<head>
<title>White Space</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#f5f5f5;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  position:relative;
}

/* character */
.character{
  margin-top:40px;
  text-align:center;
}

.character img{
  width:350px;
  max-width:90%;
  image-rendering:pixelated;
}

/* dialogue container */
.dialogue-container{
  position:relative;
  width:70%;
  margin-bottom:50px;
}

/* name box */
.name-box{
  position:absolute;
  top:-25px;
  left:10px;
  background:white;
  border:3px solid black;
  padding:6px 14px;
  font-weight:bold;
  font-size:18px;
}

/* dialogue */
.dialogue{
  background:white;
  border:4px solid black;
  padding:25px;
  font-size:22px;
  line-height:1.6;
  border-radius:5px;
  min-height:120px;
}

/* buttons */
button{
  margin-top:15px;
  background:white;
  border:2px solid black;
  padding:8px 18px;
  cursor:pointer;
  font-family:monospace;
}

button:hover{
  background:black;
  color:white;
}

.choices{
  margin-top:10px;
}

/* mute/unmute button fixed top-right */
#muteBtn{
  position:absolute;
  top:10px;
  right:10px;
  padding:6px 10px;
  font-size:16px;
  background:white;
  border:2px solid black;
  cursor:pointer;
  z-index:1000;
}

#muteBtn:hover{
  background:black;
  color:white;
}
</style>
</head>

<body>

<!-- looping background music -->
<audio id="bgm" src="whitespace.mp3" autoplay loop></audio>

<!-- mute/unmute button -->
<button id="muteBtn" onclick="toggleBGM()">🔊</button>

<!-- Wickey character -->
<div class="character" id="wickey">
<img src="mewohoney.png">
</div>

<!-- dialogue container -->
<div class="dialogue-container">
  <div class="name-box" id="speaker">Wickey</div>
  <div class="dialogue">
    <p id="text"></p>
    <div id="controls">
      <button onclick="nextDialogue()">Next ▶</button>
    </div>
  </div>
</div>

<script>
// dialogues leading to letter
let dialogue = [
  "Hm... It's quiet here.",
  "Where am I...?",
  "This place feels strange... but also familiar.",
  "Hm...?",
  "Is that something on the floor?"
];

let i = 0;
let j = 0;
let typingSpeed = 40;
let typingInterval;

// typing effect
function typeText(text){
  clearTimeout(typingInterval);
  let elem = document.getElementById("text");
  elem.innerHTML = "";
  j = 0;
  function typing(){
    if(j < text.length){
      elem.innerHTML += text.charAt(j);
      j++;
      typingInterval = setTimeout(typing, typingSpeed);
    }
  }
  typing();
}

// initialize first dialogue
typeText(dialogue[0]);

function nextDialogue(){
  i++;
  if(i < dialogue.length){
    typeText(dialogue[i]);
  } else {
    // dramatic pause
    typeText("Hm...?");
    setTimeout(function(){
      // letter discovery moment
      typeText("...My name is on it.");
      // change button for next step
      document.getElementById("controls").innerHTML =
        '<button onclick="showLetterChoices()">Next ▶</button>';
    }, 1000);
  }
}

// after discovery, choices appear
function showLetterChoices(){
  document.getElementById("wickey").style.display = "none";
  document.getElementById("speaker").style.display = "none";
  document.getElementById("text").innerText =
    "You found a letter addressed to Wickey.";
  document.getElementById("controls").innerHTML =
  `<div class="choices">
    <button onclick="examine()">Examine</button>
    <button onclick="leave()">Leave</button>
  </div>`;
}

function examine(){
  document.getElementById("text").innerText =
    "Wickey picked up the letter...";
  document.getElementById("controls").innerHTML =
    '<button onclick="readLetter()">Read</button>';
}

function leave(){
  document.getElementById("text").innerText =
    "Wickey decided to leave the letter alone.";
  document.getElementById("controls").innerHTML = "";
}

function readLetter(){
  // go to letter page
  window.location.href = "letter.html";
}

// mute/unmute background music
function toggleBGM(){
  const bgm = document.getElementById("bgm");
  if(bgm.paused){
    bgm.play();
  } else {
    bgm.pause();
  }
}
</script>

</body>
</html>
